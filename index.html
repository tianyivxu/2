<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将消除 - 羊了个羊风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 98vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        #topBar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            margin-bottom: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(10px);
        }

        #timer {
            font-size: 32px;
            font-weight: bold;
            color: #d32f2f;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            font-family: 'Courier New', monospace;
        }

        #score {
            font-size: 22px;
            color: #2e7d32;
            font-weight: bold;
        }

        #gameCanvas {
            background: linear-gradient(180deg, #81c784 0%, #66bb6a 40%, #4caf50 100%);
            border-radius: 24px;
            box-shadow: 
                0 12px 48px rgba(0, 0, 0, 0.25),
                inset 0 2px 12px rgba(255, 255, 255, 0.4),
                inset 0 -2px 12px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            flex: 1;
            max-height: 68vh;
            width: 100%;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        #slotArea {
            width: 100%;
            height: 110px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(240, 240, 240, 0.98));
            border-radius: 18px;
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            box-shadow: 0 -6px 24px rgba(0, 0, 0, 0.15);
            position: relative;
            border: 2px solid rgba(76, 175, 80, 0.3);
        }

        .slot {
            width: 75px;
            height: 85px;
            border: 3px dashed #bdbdbd;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(200, 230, 200, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .slot.filled {
            border: 3px solid #4caf50;
            background: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
            animation: slotFill 0.3s ease;
        }

        @keyframes slotFill {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .slot.eliminating {
            animation: eliminate 0.5s ease;
        }

        @keyframes eliminate {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        #gameOver, #gameWin {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: white;
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 400px;
        }

        @keyframes popIn {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .modal h1 {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .modal p {
            font-size: 26px;
            margin-bottom: 35px;
            color: #555;
        }

        .btn {
            padding: 18px 50px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.7);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .start-modal {
            background: white;
            padding: 60px;
            border-radius: 36px;
            text-align: center;
            box-shadow: 0 35px 100px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .start-modal h1 {
            font-size: 64px;
            color: #333;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
        }

        .start-modal .subtitle {
            font-size: 20px;
            color: #888;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .instructions {
            text-align: left;
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 35px;
            font-size: 15px;
            line-height: 2;
            border-left: 4px solid #4caf50;
        }

        .instructions strong {
            color: #2e7d32;
            font-size: 16px;
        }

        .instructions li {
            margin-left: 25px;
            color: #555;
        }

        .tile-preview {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .tile-preview .mini-tile {
            width: 40px;
            height: 56px;
            background: white;
            border: 2px solid #4caf50;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #d32f2f;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <div class="start-modal">
            <h1>🀄 麻将消除</h1>
            <p class="subtitle">羊了个羊风格 · 麻将堆叠消除</p>
            
            <div class="tile-preview">
                <div class="mini-tile">一</div>
                <div class="mini-tile">万</div>
                <div class="mini-tile">筒</div>
                <div class="mini-tile">条</div>
                <div class="mini-tile">东</div>
                <div class="mini-tile">中</div>
            </div>
            
            <div class="instructions">
                <strong>🎮 游戏规则：</strong>
                <ul>
                    <li>🖱️ 点击未被上层牌覆盖的顶层牌</li>
                    <li>✨ 选中的牌会沿弧线飞入底部卡槽</li>
                    <li>🎯 卡槽中凑齐3张相同牌会自动消除</li>
                    <li>⚠️ 卡槽满7张且无法消除则失败</li>
                    <li>⏰ 120秒内清空所有牌即胜利！</li>
                </ul>
            </div>
            <button class="btn" onclick="startGame()">🎮 开始游戏</button>
        </div>
    </div>

    <div id="gameContainer">
        <div id="topBar">
            <div id="timer">⏰ 120s</div>
            <div id="score">🀄 剩余: <span id="remaining">0</span> 张</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="slotArea">
            <div class="slot" id="slot0"></div>
            <div class="slot" id="slot1"></div>
            <div class="slot" id="slot2"></div>
            <div class="slot" id="slot3"></div>
            <div class="slot" id="slot4"></div>
            <div class="slot" id="slot5"></div>
            <div class="slot" id="slot6"></div>
        </div>
    </div>

    <div id="gameOver">
        <div class="modal">
            <h1>😢 游戏结束</h1>
            <p>卡槽已满，无法继续消除</p>
            <button class="btn" onclick="restartGame()">🔄 重新开始</button>
        </div>
    </div>

    <div id="gameWin">
        <div class="modal">
            <h1>🎉 恭喜通关！</h1>
            <p>🏆 用时 <span id="winTime">0</span> 秒</p>
            <button class="btn" onclick="restartGame()">🎮 再玩一局</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            TILE_WIDTH: 65,
            TILE_HEIGHT: 90,
            TILE_DEPTH: 18,  // 层叠偏移
            SLOT_COUNT: 7,
            MATCH_COUNT: 3,
            TIME_LIMIT: 120,
            LAYERS: 7
        };

        // 麻将牌类型定义
        const TILE_TYPES = [
            // 万子 1-9
            {type: 'wan', value: 1, display: '一万', short: '一', color: '#d32f2f'},
            {type: 'wan', value: 2, display: '二万', short: '二', color: '#d32f2f'},
            {type: 'wan', value: 3, display: '三万', short: '三', color: '#d32f2f'},
            {type: 'wan', value: 4, display: '四万', short: '四', color: '#d32f2f'},
            {type: 'wan', value: 5, display: '五万', short: '五', color: '#d32f2f'},
            {type: 'wan', value: 6, display: '六万', short: '六', color: '#d32f2f'},
            {type: 'wan', value: 7, display: '七万', short: '七', color: '#d32f2f'},
            {type: 'wan', value: 8, display: '八万', short: '八', color: '#d32f2f'},
            {type: 'wan', value: 9, display: '九万', short: '九', color: '#d32f2f'},
            // 筒子 1-9
            {type: 'tong', value: 1, display: '一筒', short: '①', color: '#1565c0'},
            {type: 'tong', value: 2, display: '二筒', short: '②', color: '#1565c0'},
            {type: 'tong', value: 3, display: '三筒', short: '③', color: '#1565c0'},
            {type: 'tong', value: 4, display: '四筒', short: '④', color: '#1565c0'},
            {type: 'tong', value: 5, display: '五筒', short: '⑤', color: '#1565c0'},
            {type: 'tong', value: 6, display: '六筒', short: '⑥', color: '#1565c0'},
            {type: 'tong', value: 7, display: '七筒', short: '⑦', color: '#1565c0'},
            {type: 'tong', value: 8, display: '八筒', short: '⑧', color: '#1565c0'},
            {type: 'tong', value: 9, display: '九筒', short: '⑨', color: '#1565c0'},
            // 条子 1-9
            {type: 'tiao', value: 1, display: '一条', short: '🎋', color: '#2e7d32'},
            {type: 'tiao', value: 2, display: '二条', short: '二', color: '#2e7d32'},
            {type: 'tiao', value: 3, display: '三条', short: '三', color: '#2e7d32'},
            {type: 'tiao', value: 4, display: '四条', short: '四', color: '#2e7d32'},
            {type: 'tiao', value: 5, display: '五条', short: '五', color: '#2e7d32'},
            {type: 'tiao', value: 6, display: '六条', short: '六', color: '#2e7d32'},
            {type: 'tiao', value: 7, display: '七条', short: '七', color: '#2e7d32'},
            {type: 'tiao', value: 8, display: '八条', short: '八', color: '#2e7d32'},
            {type: 'tiao', value: 9, display: '九条', short: '九', color: '#2e7d32'},
            // 风牌
            {type: 'feng', value: 'dong', display: '东风', short: '东', color: '#5d4037'},
            {type: 'feng', value: 'nan', display: '南风', short: '南', color: '#5d4037'},
            {type: 'feng', value: 'xi', display: '西风', short: '西', color: '#5d4037'},
            {type: 'feng', value: 'bei', display: '北风', short: '北', color: '#5d4037'},
            // 箭牌
            {type: 'jian', value: 'zhong', display: '红中', short: '中', color: '#d32f2f'},
            {type: 'jian', value: 'fa', display: '发财', short: '发', color: '#2e7d32'},
            {type: 'jian', value: 'bai', display: '白板', short: '白', color: '#616161'},
        ];

        // 游戏状态
        let gameState = {
            tiles: [],
            slot: [],
            timeLeft: CONFIG.TIME_LIMIT,
            score: 0,
            gameActive: false,
            animations: [],
            hoverTile: null
        };

        // Canvas 设置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 音频上下文
        let audioContext;

        // 初始化音频
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.log('音频初始化失败');
            }
        }

        // 播放音效
        function playSound(freq, duration, type = 'sine', volume = 0.3) {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = freq;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playClickSound() {
            playSound(1200, 0.08, 'square', 0.2);
            setTimeout(() => playSound(1600, 0.06, 'square', 0.15), 30);
        }

        function playPlaceSound() {
            playSound(800, 0.1, 'sine', 0.25);
            setTimeout(() => playSound(1000, 0.08, 'sine', 0.2), 50);
        }

        function playEliminateSound() {
            const notes = [523.25, 659.25, 783.99];
            notes.forEach((note, i) => {
                setTimeout(() => playSound(note, 0.25, 'sine', 0.3), i * 120);
            });
        }

        function playWinSound() {
            const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
            notes.forEach((note, i) => {
                setTimeout(() => playSound(note, 0.35, 'sine', 0.25), i * 130);
            });
        }

        function playLoseSound() {
            const notes = [400, 350, 300, 250];
            notes.forEach((note, i) => {
                setTimeout(() => playSound(note, 0.5, 'sawtooth', 0.15), i * 250);
            });
        }

        // 生成麻将牌 - 确保每种牌数量为3的倍数
        function generateTiles() {
            const tiles = [];
            
            // 总牌数：84张（可被3整除）
            const totalTiles = 84;
            const tileTypesNeeded = totalTiles / CONFIG.MATCH_COUNT; // 28种
            
            // 随机选择28种牌（每种3张）
            const shuffledTypes = [...TILE_TYPES].sort(() => Math.random() - 0.5);
            const selectedTypes = shuffledTypes.slice(0, tileTypesNeeded);
            
            // 每种牌生成3张
            selectedTypes.forEach((tileType, typeIndex) => {
                for (let i = 0; i < CONFIG.MATCH_COUNT; i++) {
                    tiles.push({
                        ...tileType,
                        id: `${tileType.type}_${tileType.value}_${i}_${typeIndex}`,
                        layer: 0,
                        gridX: 0,
                        gridY: 0,
                        pixelX: 0,
                        pixelY: 0,
                        width: CONFIG.TILE_WIDTH,
                        height: CONFIG.TILE_HEIGHT,
                        removed: false,
                        selected: false,
                        hovered: false
                    });
                }
            });
            
            return tiles;
        }

        // 布局麻将牌（金字塔状，层叠摆放）
        function layoutTiles(tiles) {
            const canvasWidth = canvas.width;
            const canvasHeight = canvas.height;
            
            // 金字塔布局：从下到上逐层减小
            // 第0层（底层）：7x7 = 49张
            // 第1层：6x6 = 36张
            // 第2层：5x5 = 25张
            // 第3层：4x4 = 16张
            // 第4层：3x3 = 9张
            // 第5层：2x2 = 4张
            // 第6层（顶层）：1x1 = 1张
            // 总计：140张，太多了，调整到84张
            
            // 重新设计：使用更紧凑的布局
            const layers = [
                {cols: 7, rows: 5},  // 35张
                {cols: 6, rows: 4},  // 24张
                {cols: 5, rows: 3},  // 15张
                {cols: 4, rows: 2},  // 8张
                {cols: 2, rows: 1},  // 2张
            ];
            // 总计：84张 ✓
            
            let tileIndex = 0;
            
            for (let layer = 0; layer < layers.length; layer++) {
                const config = layers[layer];
                const tileSpacingX = CONFIG.TILE_WIDTH * 0.75;
                const tileSpacingY = CONFIG.TILE_HEIGHT * 0.75;
                
                const totalWidth = (config.cols - 1) * tileSpacingX;
                const totalHeight = (config.rows - 1) * tileSpacingY;
                
                const startX = (canvasWidth - totalWidth) / 2;
                const startY = (canvasHeight - totalHeight) / 2 - 50;
                
                for (let row = 0; row < config.rows; row++) {
                    for (let col = 0; col < config.cols; col++) {
                        if (tileIndex >= tiles.length) break;
                        
                        const tile = tiles[tileIndex];
                        tile.layer = layer;
                        tile.gridX = col;
                        tile.gridY = row;
                        tile.pixelX = startX + col * tileSpacingX;
                        tile.pixelY = startY + row * tileSpacingY;
                        
                        tileIndex++;
                    }
                }
                
                if (tileIndex >= tiles.length) break;
            }
        }

        // 检查牌是否被上层牌覆盖（改进版）
        function isTileBlocked(tile) {
            if (tile.removed || tile.selected) return true;
            
            // 检查是否有上层牌覆盖当前牌
            for (let other of gameState.tiles) {
                if (other.removed || other.selected || other.id === tile.id) continue;
                if (other.layer <= tile.layer) continue;
                
                // 计算两个牌的重叠区域
                const tileLeft = tile.pixelX;
                const tileRight = tile.pixelX + tile.width;
                const tileTop = tile.pixelY - tile.layer * CONFIG.TILE_DEPTH;
                const tileBottom = tile.pixelY + tile.height - tile.layer * CONFIG.TILE_DEPTH;
                
                const otherLeft = other.pixelX;
                const otherRight = other.pixelX + other.width;
                const otherTop = other.pixelY - other.layer * CONFIG.TILE_DEPTH;
                const otherBottom = other.pixelY + other.height - other.layer * CONFIG.TILE_DEPTH;
                
                // 检查是否重叠（考虑一定的容差）
                const overlapThreshold = 0.3; // 30%重叠即视为被遮挡
                const overlapX = Math.max(0, Math.min(tileRight, otherRight) - Math.max(tileLeft, otherLeft));
                const overlapY = Math.max(0, Math.min(tileBottom, otherBottom) - Math.max(tileTop, otherTop));
                
                const overlapArea = overlapX * overlapY;
                const tileArea = tile.width * tile.height;
                
                if (overlapArea > tileArea * overlapThreshold) {
                    return true;
                }
            }
            
            return false;
        }

        // 绘制麻将牌（改进版，增强3D效果）
        function drawTile(tile, isHovered = false) {
            const x = tile.pixelX;
            const y = tile.pixelY - tile.layer * CONFIG.TILE_DEPTH;
            const w = tile.width;
            const h = tile.height;
            
            // 绘制底部阴影（多层阴影增强3D效果）
            if (tile.layer > 0) {
                // 主阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.fillRect(x + 4, y + 4, w, h);
                
                // 次阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(x + 8, y + 8, w, h);
            }
            
            // 绘制牌体侧面（表现厚度）
            if (tile.layer > 0) {
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(x, y + h - 5, w, 5);
                ctx.fillRect(x + w - 5, y, 5, h);
            }
            
            // 绘制牌体正面
            const gradient = ctx.createLinearGradient(x, y, x, y + h);
            gradient.addColorStop(0, isHovered ? '#fffff0' : '#ffffff');
            gradient.addColorStop(1, isHovered ? '#fff8e1' : '#fafafa');
            
            ctx.fillStyle = gradient;
            ctx.strokeStyle = isHovered ? '#ffd700' : (tile.layer === 0 ? '#4caf50' : '#bdbdbd');
            ctx.lineWidth = isHovered ? 4 : (tile.layer === 0 ? 3 : 2);
            
            // 圆角矩形
            const radius = 10;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            
            ctx.fill();
            ctx.stroke();
            
            // 绘制牌面图案
            drawTilePattern(tile, x, y, w, h);
            
            // 如果被遮挡，添加半透明遮罩
            if (isTileBlocked(tile) && !tile.removed && !tile.selected) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                ctx.fill();
                
                // 添加"不可点击"标记
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.moveTo(x + 15, y + 15);
                ctx.lineTo(x + w - 15, y + h - 15);
                ctx.moveTo(x + w - 15, y + 15);
                ctx.lineTo(x + 15, y + h - 15);
                ctx.stroke();
            }
            
            // 悬停效果
            if (isHovered && !isTileBlocked(tile)) {
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 4;
                ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);
                
                // 发光效果
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 20;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // 绘制牌面图案（改进版）
        function drawTilePattern(tile, x, y, w, h) {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            if (tile.type === 'wan') {
                // 万子
                ctx.fillStyle = tile.color;
                ctx.font = 'bold 32px "Microsoft YaHei"';
                ctx.fillText(tile.value.toString(), x + w/2, y + h/2 - 10);
                
                ctx.font = '16px "Microsoft YaHei"';
                ctx.fillText('万', x + w/2, y + h/2 + 18);
                
                // 装饰
                ctx.strokeStyle = tile.color;
                ctx.lineWidth = 1.5;
                ctx.strokeRect(x + 10, y + 10, w - 20, h - 20);
                
            } else if (tile.type === 'tong') {
                // 筒子
                drawTongPatternEnhanced(x, y, w, h, tile.value, tile.color);
                
            } else if (tile.type === 'tiao') {
                // 条子
                if (tile.value === 1) {
                    ctx.font = '40px "Segoe UI Emoji"';
                    ctx.fillText('🎋', x + w/2, y + h/2);
                } else {
                    ctx.fillStyle = tile.color;
                    ctx.font = 'bold 28px "Microsoft YaHei"';
                    ctx.fillText(tile.value.toString(), x + w/2, y + h/2 - 10);
                    
                    ctx.font = '16px "Microsoft YaHei"';
                    ctx.fillText('条', x + w/2, y + h/2 + 18);
                    
                    ctx.strokeStyle = tile.color;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x + 10, y + 10, w - 20, h - 20);
                }
                
            } else if (tile.type === 'feng') {
                // 风牌
                ctx.fillStyle = tile.color;
                ctx.font = 'bold 42px "Microsoft YaHei"';
                ctx.fillText(tile.short, x + w/2, y + h/2);
                
                // 装饰边框
                ctx.strokeStyle = tile.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x + 6, y + 6, w - 12, h - 12);
                
            } else if (tile.type === 'jian') {
                // 箭牌
                ctx.fillStyle = tile.color;
                ctx.font = 'bold 42px "Microsoft YaHei"';
                ctx.fillText(tile.short, x + w/2, y + h/2);
                
                // 装饰边框
                ctx.strokeStyle = tile.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x + 6, y + 6, w - 12, h - 12);
                
                // 白板特殊标记
                if (tile.value === 'bai') {
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 24px "Microsoft YaHei"';
                    ctx.fillText('白', x + w/2, y + h/2);
                }
            }
        }

        // 绘制筒子图案（改进版）
        function drawTongPatternEnhanced(x, y, w, h, value, color) {
            const centerX = x + w/2;
            const centerY = y + h/2;
            const radius = 10;
            
            ctx.fillStyle = color;
            
            // 根据数值绘制对应数量的圆
            const positions = getTongPositions(value, centerX, centerY, radius);
            
            positions.forEach((pos, idx) => {
                // 绘制圆形
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                
                // 白色边框
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                
                // 内部高光
                ctx.beginPath();
                ctx.arc(pos.x - 2, pos.y - 2, radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            });
            
            // 绘制"筒"字
            ctx.fillStyle = color;
            ctx.font = '13px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText('筒', x + w/2, y + h - 14);
        }

        // 获取筒子图案位置（改进版）
        function getTongPositions(value, centerX, centerY, radius) {
            const positions = [];
            const gap = radius * 2.2;
            
            switch(value) {
                case 1:
                    positions.push({x: centerX, y: centerY});
                    break;
                case 2:
                    positions.push({x: centerX - gap/2, y: centerY});
                    positions.push({x: centerX + gap/2, y: centerY});
                    break;
                case 3:
                    positions.push({x: centerX, y: centerY - gap/2});
                    positions.push({x: centerX - gap/2, y: centerY + gap/2});
                    positions.push({x: centerX + gap/2, y: centerY + gap/2});
                    break;
                case 4:
                    positions.push({x: centerX - gap/2, y: centerY - gap/2});
                    positions.push({x: centerX + gap/2, y: centerY - gap/2});
                    positions.push({x: centerX - gap/2, y: centerY + gap/2});
                    positions.push({x: centerX + gap/2, y: centerY + gap/2});
                    break;
                case 5:
                    positions.push({x: centerX, y: centerY});
                    positions.push({x: centerX - gap, y: centerY - gap});
                    positions.push({x: centerX + gap, y: centerY - gap});
                    positions.push({x: centerX - gap, y: centerY + gap});
                    positions.push({x: centerX + gap, y: centerY + gap});
                    break;
                case 6:
                    positions.push({x: centerX - gap/2, y: centerY - gap});
                    positions.push({x: centerX + gap/2, y: centerY - gap});
                    positions.push({x: centerX - gap/2, y: centerY});
                    positions.push({x: centerX + gap/2, y: centerY});
                    positions.push({x: centerX - gap/2, y: centerY + gap});
                    positions.push({x: centerX + gap/2, y: centerY + gap});
                    break;
                case 7:
                    positions.push({x: centerX, y: centerY - gap});
                    positions.push({x: centerX - gap, y: centerY});
                    positions.push({x: centerX + gap, y: centerY});
                    positions.push({x: centerX, y: centerY});
                    positions.push({x: centerX - gap, y: centerY + gap});
                    positions.push({x: centerX + gap, y: centerY + gap});
                    positions.push({x: centerX, y: centerY + gap});
                    break;
                case 8:
                    positions.push({x: centerX - gap, y: centerY - gap});
                    positions.push({x: centerX, y: centerY - gap});
                    positions.push({x: centerX + gap, y: centerY - gap});
                    positions.push({x: centerX - gap, y: centerY});
                    positions.push({x: centerX + gap, y: centerY});
                    positions.push({x: centerX - gap, y: centerY + gap});
                    positions.push({x: centerX, y: centerY + gap});
                    positions.push({x: centerX + gap, y: centerY + gap});
                    break;
                case 9:
                    positions.push({x: centerX, y: centerY - gap});
                    positions.push({x: centerX - gap, y: centerY});
                    positions.push({x: centerX, y: centerY});
                    positions.push({x: centerX + gap, y: centerY});
                    positions.push({x: centerX, y: centerY});
                    positions.push({x: centerX - gap, y: centerY + gap});
                    positions.push({x: centerX, y: centerY + gap});
                    positions.push({x: centerX + gap, y: centerY + gap});
                    positions.push({x: centerX, y: centerY + gap * 1.5});
                    break;
            }
            
            return positions;
        }

        // 绘制游戏
        function drawGame() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            drawBackground();
            
            // 按层级排序绘制（从下到上）
            const sortedTiles = [...gameState.tiles]
                .filter(t => !t.removed && !t.selected)
                .sort((a, b) => {
                    // 先按层排序，同层按Y坐标排序
                    if (a.layer !== b.layer) return a.layer - b.layer;
                    return a.pixelY - b.pixelY;
                });
            
            // 绘制所有牌
            sortedTiles.forEach(tile => {
                const isHovered = (tile === gameState.hoverTile) && !isTileBlocked(tile);
                drawTile(tile, isHovered);
            });
            
            // 绘制动画
            drawAnimations();
            
            // 绘制可点击提示
            drawClickableHints();
        }

        // 绘制可点击提示
        function drawClickableHints() {
            if (!gameState.gameActive) return;
            
            gameState.tiles
                .filter(t => !t.removed && !t.selected && !isTileBlocked(t))
                .forEach(tile => {
                    const x = tile.pixelX;
                    const y = tile.pixelY - tile.layer * CONFIG.TILE_DEPTH;
                    
                    // 绘制呼吸光环
                    const time = Date.now() / 1000;
                    const alpha = 0.2 + Math.sin(time * 3) * 0.15;
                    
                    ctx.strokeStyle = `rgba(76, 175, 80, ${alpha})`;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.strokeRect(x - 4, y - 4, tile.width + 8, tile.height + 8);
                    ctx.setLineDash([]);
                });
        }

        // 绘制背景
        function drawBackground() {
            // 绘制渐变背景
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, canvas.width/2
            );
            gradient.addColorStop(0, '#a5d6a7');
            gradient.addColorStop(1, '#388e3c');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制装饰纹理
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制中心装饰
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 150, 0, Math.PI * 2);
            ctx.fill();
        }

        // 动画系统
        function addAnimation(tile) {
            const startX = tile.pixelX;
            const startY = tile.pixelY - tile.layer * CONFIG.TILE_DEPTH;
            const slotIndex = gameState.slot.length - 1;
            const endX = 50 + slotIndex * 90;
            const endY = canvas.height + 150;
            
            const anim = {
                tile: tile,
                startX: startX,
                startY: startY,
                endX: endX,
                endY: endY,
                progress: 0,
                duration: 600,
                startTime: Date.now()
            };
            
            gameState.animations.push(anim);
        }

        function drawAnimations() {
            const now = Date.now();
            
            gameState.animations = gameState.animations.filter(anim => {
                const elapsed = now - anim.startTime;
                anim.progress = Math.min(elapsed / anim.duration, 1);
                
                // 使用三次贝塞尔曲线实现更自然的弧线运动
                const t = anim.progress;
                const easedT = cubicBezier(0.25, 0.46, 0.45, 0.94, t);
                
                // 弧线高度
                const arcHeight = -150 * Math.sin(Math.PI * t);
                const currentX = anim.startX + (anim.endX - anim.startX) * easedT;
                const currentY = anim.startY + (anim.endY - anim.startY) * easedT + arcHeight;
                
                // 旋转效果
                const rotation = Math.sin(Math.PI * t) * 0.3;
                
                // 绘制动画中的牌
                ctx.save();
                ctx.translate(currentX + CONFIG.TILE_WIDTH/2, currentY + CONFIG.TILE_HEIGHT/2);
                ctx.rotate(rotation);
                ctx.globalAlpha = 1 - t * 0.4;
                
                drawTile({
                    ...anim.tile,
                    pixelX: -CONFIG.TILE_WIDTH/2,
                    pixelY: -CONFIG.TILE_HEIGHT/2,
                    layer: 0
                });
                
                ctx.restore();
                ctx.globalAlpha = 1;
                
                return anim.progress < 1;
            });
        }

        // 三次贝塞尔曲线
        function cubicBezier(p0, p1, p2, p3, t) {
            const u = 1 - t;
            const tt = t * t;
            const uu = u * u;
            const uuu = uu * u;
            const ttt = tt * t;
            
            return uuu * p0 + 3 * uu * t * p1 + 3 * u * tt * p2 + ttt * p3;
        }

        // 处理鼠标移动
        function handleMouseMove(event) {
            if (!gameState.gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            // 查找悬停的牌
            const clickableTiles = gameState.tiles
                .filter(t => !t.removed && !t.selected && !isTileBlocked(t))
                .sort((a, b) => b.layer - a.layer);
            
            let found = false;
            for (let tile of clickableTiles) {
                const tileY = tile.pixelY - tile.layer * CONFIG.TILE_DEPTH;
                
                if (x >= tile.pixelX && x <= tile.pixelX + tile.width &&
                    y >= tileY && y <= tileY + tile.height) {
                    gameState.hoverTile = tile;
                    canvas.style.cursor = 'pointer';
                    found = true;
                    break;
                }
            }
            
            if (!found) {
                gameState.hoverTile = null;
                canvas.style.cursor = 'default';
            }
        }

        // 处理点击事件
        function handleClick(event) {
            if (!gameState.gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            // 从上层到下层的顺序检查点击
            const clickableTiles = gameState.tiles
                .filter(t => !t.removed && !t.selected && !isTileBlocked(t))
                .sort((a, b) => b.layer - a.layer);
            
            for (let tile of clickableTiles) {
                const tileY = tile.pixelY - tile.layer * CONFIG.TILE_DEPTH;
                
                if (x >= tile.pixelX && x <= tile.pixelX + tile.width &&
                    y >= tileY && y <= tileY + tile.height) {
                    
                    // 播放点击音效
                    playClickSound();
                    
                    // 将牌添加到卡槽
                    addToSlot(tile);
                    break;
                }
            }
        }

        // 添加到卡槽
        function addToSlot(tile) {
            if (gameState.slot.length >= CONFIG.SLOT_COUNT) {
                return;
            }
            
            tile.selected = true;
            gameState.slot.push(tile);
            
            // 播放放置音效
            setTimeout(() => playPlaceSound(), 300);
            
            // 添加动画
            addAnimation(tile);
            
            // 更新卡槽显示
            updateSlotDisplay();
            
            // 检查是否可以消除
            setTimeout(() => {
                checkElimination();
            }, 700);
        }

        // 更新卡槽显示
        function updateSlotDisplay() {
            for (let i = 0; i < CONFIG.SLOT_COUNT; i++) {
                const slotElement = document.getElementById(`slot${i}`);
                slotElement.className = 'slot';
                slotElement.innerHTML = '';
                
                if (i < gameState.slot.length) {
                    const tile = gameState.slot[i];
                    slotElement.className = 'slot filled';
                    
                    // 创建牌的显示
                    const tileDiv = document.createElement('div');
                    tileDiv.style.cssText = `
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        font-weight: bold;
                        color: ${tile.color};
                        background: linear-gradient(135deg, #ffffff, #f5f5f5);
                        border-radius: 10px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                    `;
                    
                    const mainSymbol = document.createElement('div');
                    mainSymbol.style.cssText = 'font-size: 28px; line-height: 1;';
                    mainSymbol.textContent = tile.short;
                    
                    const subText = document.createElement('div');
                    subText.style.cssText = 'font-size: 10px; color: #888; margin-top: 2px;';
                    
                    if (tile.type === 'feng') {
                        subText.textContent = '风';
                    } else if (tile.type === 'jian') {
                        subText.textContent = '箭';
                    } else {
                        subText.textContent = tile.type === 'wan' ? '万' : tile.type === 'tong' ? '筒' : '条';
                    }
                    
                    tileDiv.appendChild(mainSymbol);
                    tileDiv.appendChild(subText);
                    slotElement.appendChild(tileDiv);
                }
            }
            
            // 检查游戏失败
            if (gameState.slot.length >= CONFIG.SLOT_COUNT) {
                setTimeout(() => checkGameOver(), 500);
            }
        }

        // 检查消除
        function checkElimination() {
            const slot = gameState.slot;
            
            // 统计每种牌的数量
            const tileCounts = {};
            slot.forEach((tile, index) => {
                const key = `${tile.type}_${tile.value}`;
                if (!tileCounts[key]) {
                    tileCounts[key] = [];
                }
                tileCounts[key].push(index);
            });
            
            // 检查是否有3张相同的牌
            for (let key in tileCounts) {
                if (tileCounts[key].length >= CONFIG.MATCH_COUNT) {
                    // 消除这3张牌
                    const indices = tileCounts[key].slice(0, CONFIG.MATCH_COUNT);
                    
                    // 播放消除音效
                    playEliminateSound();
                    
                    // 添加消除动画
                    indices.forEach(index => {
                        const slotElement = document.getElementById(`slot${index}`);
                        if (slotElement) {
                            slotElement.classList.add('eliminating');
                        }
                    });
                    
                    // 延迟删除
                    setTimeout(() => {
                        // 从后往前删除，避免索引错乱
                        indices.sort((a, b) => b - a);
                        indices.forEach(index => {
                            const tile = gameState.slot[index];
                            tile.removed = true;
                            gameState.slot.splice(index, 1);
                        });
                        
                        // 更新分数
                        gameState.score += 10;
                        document.getElementById('remaining').textContent = 
                            gameState.tiles.filter(t => !t.removed).length;
                        
                        // 更新卡槽显示
                        updateSlotDisplay();
                        
                        // 检查是否胜利
                        checkWin();
                    }, 500);
                    
                    break;
                }
            }
        }

        // 检查游戏失败
        function checkGameOver() {
            if (gameState.slot.length < CONFIG.SLOT_COUNT) return;
            
            // 检查卡槽中是否有可以消除的牌
            const slot = gameState.slot;
            const tileCounts = {};
            
            slot.forEach(tile => {
                const key = `${tile.type}_${tile.value}`;
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });
            
            // 如果卡槽满且没有任何牌的数量 >= 3，则失败
            const hasMatch = Object.values(tileCounts).some(count => count >= CONFIG.MATCH_COUNT);
            
            if (!hasMatch) {
                gameState.gameActive = false;
                playLoseSound();
                setTimeout(() => {
                    document.getElementById('gameOver').style.display = 'flex';
                }, 500);
            }
        }

        // 检查胜利
        function checkWin() {
            const remaining = gameState.tiles.filter(t => !t.removed).length;
            
            if (remaining === 0) {
                gameState.gameActive = false;
                playWinSound();
                
                const timeUsed = CONFIG.TIME_LIMIT - gameState.timeLeft;
                document.getElementById('winTime').textContent = timeUsed;
                setTimeout(() => {
                    document.getElementById('gameWin').style.display = 'flex';
                }, 500);
            }
        }

        // 计时器
        let timerInterval;
        function updateTimer() {
            if (!gameState.gameActive) {
                clearInterval(timerInterval);
                return;
            }
            
            gameState.timeLeft--;
            document.getElementById('timer').textContent = `⏰ ${gameState.timeLeft}s`;
            
            // 时间紧迫提示
            if (gameState.timeLeft <= 30) {
                document.getElementById('timer').style.color = '#ff0000';
                document.getElementById('timer').style.animation = 'pulse 1s infinite';
            }
            
            if (gameState.timeLeft <= 0) {
                gameState.gameActive = false;
                playLoseSound();
                clearInterval(timerInterval);
                setTimeout(() => {
                    document.getElementById('gameOver').style.display = 'flex';
                }, 500);
            }
        }

        // 开始游戏
        function startGame() {
            // 隐藏开始屏幕
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('gameWin').style.display = 'none';
            
            // 初始化音频
            initAudio();
            
            // 重置游戏状态
            gameState = {
                tiles: [],
                slot: [],
                timeLeft: CONFIG.TIME_LIMIT,
                score: 0,
                gameActive: true,
                animations: [],
                hoverTile: null
            };
            
            // 生成并布局牌
            gameState.tiles = generateTiles();
            layoutTiles(gameState.tiles);
            
            // 更新显示
            document.getElementById('timer').textContent = `⏰ ${gameState.timeLeft}s`;
            document.getElementById('timer').style.color = '#d32f2f';
            document.getElementById('timer').style.animation = 'none';
            document.getElementById('remaining').textContent = 
                gameState.tiles.filter(t => !t.removed).length;
            
            // 清空卡槽
            for (let i = 0; i < CONFIG.SLOT_COUNT; i++) {
                const slotElement = document.getElementById(`slot${i}`);
                slotElement.className = 'slot';
                slotElement.innerHTML = '';
            }
            
            // 开始游戏循环
            gameLoop();
            
            // 开始计时器
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        // 重新开始
        function restartGame() {
            clearInterval(timerInterval);
            startGame();
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameState.gameActive) return;
            
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        // 调整Canvas大小
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const topBar = document.getElementById('topBar');
            const slotArea = document.getElementById('slotArea');
            
            const availableHeight = window.innerHeight - topBar.offsetHeight - slotArea.offsetHeight - 50;
            
            canvas.width = Math.min(1000, window.innerWidth - 40);
            canvas.height = Math.max(450, availableHeight);
            
            // 重新布局牌
            if (gameState.tiles.length > 0 && gameState.gameActive) {
                layoutTiles(gameState.tiles);
            }
        }

        // 初始化
        window.onload = function() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('mousemove', handleMouseMove);
            
            // 添加CSS动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes pulse {
                    0%, 100% { transform: scale(1); }
                    50% { transform: scale(1.1); }
                }
            `;
            document.head.appendChild(style);
        };
    </script>
</body>
</html>
